<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="mermaid.min.js"></script>
</head>
<body>
<div id="host" style="position:absolute;left:-100000px;top:0"></div>
<script>
const baseConfig = {
  startOnLoad: false,
  securityLevel: 'strict',
  suppressErrorRendering: true,
  htmlLabels: false,
  flowchart: {htmlLabels: false, useMaxWidth: false},
  maxTextSize: 200000,
  maxEdges: 2000
};
const styleProperties = [
  'fill', 'fill-opacity', 'stroke', 'stroke-opacity', 'stroke-width',
  'stroke-dasharray', 'stroke-linecap', 'stroke-linejoin', 'opacity',
  'font-family', 'font-size', 'font-style', 'font-weight', 'text-anchor',
  'dominant-baseline', 'color'
];
function decode(encoded) {
  const bytes = Uint8Array.from(atob(encoded), value => value.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function flatten(svg) {
  svg.querySelectorAll('script,foreignObject').forEach(node => node.remove());
  for (const element of svg.querySelectorAll('*')) {
    for (const attribute of [...element.attributes]) {
      const name = attribute.name.toLowerCase();
      const value = attribute.value.toLowerCase();
      if (name.startsWith('on') || value.includes('javascript:')) element.removeAttribute(attribute.name);
    }
    const computed = getComputedStyle(element);
    const values = [];
    for (const property of styleProperties) {
      const value = computed.getPropertyValue(property);
      if (value) values.push(`${property}:${value}`);
    }
    if (values.length) element.setAttribute('style', values.join(';'));
  }
  return new XMLSerializer().serializeToString(svg);
}
window.elmdRender = async function(id, encoded, dark) {
  const host = document.getElementById('host');
  try {
    mermaid.initialize({...baseConfig, theme: dark ? 'dark' : 'default'});
    const result = await mermaid.render(`elmd-mermaid-${id}`, decode(encoded));
    host.innerHTML = result.svg;
    const svg = host.querySelector('svg');
    if (!svg) throw new Error('Mermaid did not return SVG');
    const viewBox = svg.viewBox.baseVal;
    const width = viewBox && viewBox.width ? viewBox.width : svg.getBBox().width;
    const height = viewBox && viewBox.height ? viewBox.height : svg.getBBox().height;
    const serialized = flatten(svg);
    host.replaceChildren();
    chrome.webview.postMessage({id, svg: serialized, width, height});
  } catch (error) {
    host.replaceChildren();
    chrome.webview.postMessage({id, error: String(error && error.message ? error.message : error)});
  }
};
chrome.webview.postMessage({ready: true});
</script>
</body>
</html>
