<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 512 512" fill="none">

  <defs>
    <linearGradient id="paper" x1="96" y1="56" x2="424" y2="456"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.78" stop-color="#FCFCFD"/>
      <stop offset="1" stop-color="#F4F5F8"/>
    </linearGradient>

    <linearGradient id="fold" x1="304" y1="56" x2="430" y2="182"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F0F2F6"/>
    </linearGradient>

    <filter id="paperShadow"
            x="68" y="34" width="392" height="452"
            filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10"
                    flood-color="#000000" flood-opacity="0.10"/>
    </filter>

    <filter id="foldShadow"
            x="286" y="46" width="176" height="180"
            filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="7" stdDeviation="7"
                    flood-color="#000000" flood-opacity="0.11"/>
    </filter>
  </defs>

  <g filter="url(#paperShadow)">
    <path
      d="M128 56
         H316
         L420 160
         V416
         C420 438.1 402.1 456 380 456
         H132
         C109.9 456 92 438.1 92 416
         V92
