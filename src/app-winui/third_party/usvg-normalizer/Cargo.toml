[package]
name = "folia-native-svg"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
name = "folia_svg_normalizer"
crate-type = ["cdylib"]

[dependencies]
base64 = "=0.22.1"
mermaid-rs-renderer = { version = "=0.3.1", default-features = false }
roxmltree = "=0.21.1"
usvg = { version = "=0.47.0", default-features = true }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = "symbols"
