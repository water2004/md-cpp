[package]
name = "elmd-native-svg"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
name = "elmd_svg_normalizer"
crate-type = ["cdylib"]

[dependencies]
mermaid-rs-renderer = { version = "=0.3.1", default-features = false }
usvg = { version = "=0.47.0", default-features = true }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = "symbols"
