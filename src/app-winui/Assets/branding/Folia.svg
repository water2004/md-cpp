      fill="url(#paper)"
      stroke="#ECEEF3"
      stroke-width="1.4"/>
  </g>

  <g filter="url(#foldShadow)">
    <path
      d="M316 56
         L420 160
         H368
         C339.3 160 316 136.7 316 108
         V56Z"
      fill="url(#fold)"/>
  </g>

  <g stroke="#238AF5" stroke-width="10" stroke-linecap="round">
    <path d="M178 170 L170 234"/>
    <path d="M208 170 L200 234"/>
    <path d="M156 190 H220"/>
    <path d="M152 216 H216"/>
  </g>

  <path d="M258 202 H346"
        stroke="#D3D8E4"
        stroke-width="11"
        stroke-linecap="round"/>

  <path d="M160 276 H346"
        stroke="#D3D8E4"
        stroke-width="12"
        stroke-linecap="round"/>
  <path d="M160 332 H322"
